name: Terraform PR Validation

on:
  pull_request:
    paths:
      - 'terraform/**'
      - '.github/workflows/**'

permissions:
  contents: read
  id-token: write

jobs:
  detect-changes:
    name: Detect Changed Terraform Environments
    runs-on: ubuntu-latest
    outputs:
      dev_cloud_run: ${{ steps.filter.outputs.dev_cloud_run }}
      stage_cloud_run: ${{ steps.filter.outputs.stage_cloud_run }}
      prod_cloud_run: ${{ steps.filter.outputs.prod_cloud_run }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            dev_cloud_run:
              - 'terraform/environments/dev/cloud-run/**'
            stage_cloud_run:
              - 'terraform/environments/stage/cloud-run/**'
            prod_cloud_run:
              - 'terraform/environments/prod/cloud-run/**'

  validate-dev-cloud-run:
    name: Validate Dev Cloud Run
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.dev_cloud_run == 'true'
    env:
      TF_WORKING_DIR: terraform/environments/dev/cloud-run
      TF_IN_AUTOMATION: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud via OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/915035381641/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: paved-road-sa@imposing-fx-413205.iam.gserviceaccount.com

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        run: terraform -chdir=${TF_WORKING_DIR} fmt -check -recursive

      - name: Terraform init
        run: terraform -chdir=${TF_WORKING_DIR} init

      - name: Terraform validate
        run: terraform -chdir=${TF_WORKING_DIR} validate

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: ${{ env.TF_WORKING_DIR }}
          quiet: true
          framework: terraform
          soft_fail: false

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: ${{ env.TF_WORKING_DIR }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Terraform plan
        run: terraform -chdir=${TF_WORKING_DIR} plan -out=tfplan

      - name: Upload Terraform plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: dev-cloud-run-tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan

      - name: Notify Slack (PR Validation Success)
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \"✅ *PR Validation Passed*\nRepo: ${{ github.repository }}\nBranch: ${{ github.head_ref }}\nCommit: \`${{ github.sha }}\`\nEnvironment: dev\"
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack (PR Validation Failure)
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \"❌ *PR Validation Failed*\nRepo: ${{ github.repository }}\nBranch: ${{ github.head_ref }}\nCommit: \`${{ github.sha }}\`\nEnvironment: dev\nCheck logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}

  validate-stage-cloud-run:
    name: Validate Stage Cloud Run
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.stage_cloud_run == 'true'
    env:
      TF_WORKING_DIR: terraform/environments/stage/cloud-run
      TF_IN_AUTOMATION: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud via OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/915035381641/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: paved-road-deployer@paved-road-stage-413205.iam.gserviceaccount.com
          project_id: paved-road-stage-413205
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        run: terraform -chdir=${TF_WORKING_DIR} fmt -check -recursive

      - name: Terraform init
        run: terraform -chdir=${TF_WORKING_DIR} init

      - name: Terraform validate
        run: terraform -chdir=${TF_WORKING_DIR} validate

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: ${{ env.TF_WORKING_DIR }}
          quiet: true
          framework: terraform
          soft_fail: false

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: ${{ env.TF_WORKING_DIR }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Terraform plan
        env:
          TF_VAR_alert_email: ${{ secrets.STAGE_ALERT_EMAIL }}
        run: terraform -chdir=${TF_WORKING_DIR} plan -input=false -no-color

      - name: Notify Slack (PR Validation Success)
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \"✅ *PR Validation Passed*\nRepo: ${{ github.repository }}\nBranch: ${{ github.head_ref }}\nCommit: \`${{ github.sha }}\`\nEnvironment: stage\"
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack (PR Validation Failure)
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \"❌ *PR Validation Failed*\nRepo: ${{ github.repository }}\nBranch: ${{ github.head_ref }}\nCommit: \`${{ github.sha }}\`\nEnvironment: stage\nCheck logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}

  validate-prod-cloud-run:
    name: Validate Prod Cloud Run
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.prod_cloud_run == 'true'
    env:
      TF_WORKING_DIR: terraform/environments/prod/cloud-run
      TF_IN_AUTOMATION: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud via OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/915035381641/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: paved-road-sa@imposing-fx-413205.iam.gserviceaccount.com

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        run: terraform -chdir=${TF_WORKING_DIR} fmt -check -recursive

      - name: Terraform init
        run: terraform -chdir=${TF_WORKING_DIR} init

      - name: Terraform validate
        run: terraform -chdir=${TF_WORKING_DIR} validate

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: ${{ env.TF_WORKING_DIR }}
          quiet: true
          framework: terraform
          soft_fail: false

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: ${{ env.TF_WORKING_DIR }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Terraform plan
        run: terraform -chdir=${TF_WORKING_DIR} plan -out=tfplan

      - name: Upload Terraform plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: prod-cloud-run-tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan

      - name: Notify Slack (PR Validation Success)
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \"✅ *PR Validation Passed*\nRepo: ${{ github.repository }}\nBranch: ${{ github.head_ref }}\nCommit: \`${{ github.sha }}\`\nEnvironment: prod\"
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack (PR Validation Failure)
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \"❌ *PR Validation Failed*\nRepo: ${{ github.repository }}\nBranch: ${{ github.head_ref }}\nCommit: \`${{ github.sha }}\`\nEnvironment: prod\nCheck logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}