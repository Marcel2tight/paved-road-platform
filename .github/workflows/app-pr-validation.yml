name: Application PR Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/app-pr-validation.yml"
      - ".github/workflows/build-paved-road-image.yml"
  push:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/app-pr-validation.yml"

permissions:
  contents: read

jobs:
  validate-application:
    name: Test and Validate Application Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install \
            --disable-pip-version-check \
            --no-cache-dir \
            -r app/requirements.txt

          python -m pip check

      - name: Run unit tests
        run: |
          python -m unittest \
            discover \
            -s app \
            -p "test_*.py" \
            -v

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: app/Dockerfile
          failure-threshold: warning

      - name: Build local application image
        run: |
          docker build \
            --tag paved-road-platform:pr \
            app

      - name: Scan application image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: paved-road-platform:pr
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      - name: Run container smoke tests
        shell: bash
        run: |
          set -euo pipefail

          CONTAINER_ID="$(
            docker run \
              --detach \
              --publish 127.0.0.1:8080:8080 \
              --env ENVIRONMENT=pr \
              --env APP_VERSION=pr \
              --env COMMIT_SHA="${GITHUB_SHA}" \
              paved-road-platform:pr
          )"

          cleanup() {
            docker logs "${CONTAINER_ID}" || true
            docker rm --force "${CONTAINER_ID}" >/dev/null 2>&1 || true
          }

          trap cleanup EXIT

          for attempt in $(seq 1 30); do
            if curl --fail --silent \
              http://127.0.0.1:8080/health >/dev/null; then
              break
            fi

            if [ "${attempt}" -eq 30 ]; then
              echo "Container did not become healthy."
              exit 1
            fi

            sleep 2
          done

          curl --fail --silent \
            http://127.0.0.1:8080/ready >/dev/null

          curl --fail --silent \
            http://127.0.0.1:8080/version >/dev/null

          curl --fail --silent \
            http://127.0.0.1:8080/metrics >/dev/null
