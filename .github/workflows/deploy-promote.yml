name: Promote Infrastructure

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - stage
          - prod
      component:
        description: "Infrastructure component"
        required: true
        type: choice
        options:
          - cloud-run
      release_tag:
        description: "Previously built and signed release tag"
        required: true
        default: "v1.0.1"
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  promotion-plan:
    name: "Plan (${{ inputs.target_environment }})"
    runs-on: ubuntu-latest

    outputs:
      expected_digest_uri: ${{ steps.image.outputs.target_digest_uri }}

    environment: ${{ format('{0}-plan', inputs.target_environment) }}

    concurrency:
      group: promote-plan-${{ inputs.target_environment }}-${{ inputs.component }}
      cancel-in-progress: false

    env:
      TF_WORKING_DIR: ${{ vars.TF_ROOT }}
      TF_IN_AUTOMATION: true
      TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud via OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOYER_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform -chdir="${TF_WORKING_DIR}" init -reconfigure

      - name: Select Terraform workspace
        shell: bash
        run: |
          terraform -chdir="${TF_WORKING_DIR}" workspace select default

      - name: Verify Terraform backend state
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Diagnostic: Core Context ==="
          echo "Terraform working directory: ${TF_WORKING_DIR}"
          
          echo "=== Diagnostic: Selected Workspace ==="
          terraform -chdir="${TF_WORKING_DIR}" workspace show

          echo "=== Diagnostic: Active Resources in State ==="
          terraform -chdir="${TF_WORKING_DIR}" state list

      - name: Show Terraform state resource
        shell: bash
        run: |
          terraform -chdir="${TF_WORKING_DIR}" state show \
            module.cloud_run_app.google_cloud_run_v2_service.this

      - name: Terraform validate
        run: terraform -chdir="${TF_WORKING_DIR}" validate

      - name: Configure Artifact Registry authentication
        shell: bash
        run: |
          gcloud auth configure-docker \
            "${{ vars.GCP_REGION }}-docker.pkg.dev" \
            --quiet

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Install SLSA verifier
        uses: slsa-framework/slsa-verifier/actions/installer@v2.7.1

      - name: Resolve promotion references
        id: image
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          SOURCE_PROJECT_ID: ${{ vars.SOURCE_PROJECT_ID }}
          BUILD_SOURCE_PROJECT_ID: ${{ vars.BUILD_SOURCE_PROJECT_ID }}
          TARGET_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          REGION: ${{ vars.GCP_REGION }}
          REPOSITORY: ${{ vars.IMAGE_REPOSITORY }}
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
        run: |
          set -euo pipefail

          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must use semantic version format such as v1.0.1."
            exit 1
          fi

          TFVARS_FILE="${TF_WORKING_DIR}/terraform.tfvars"

          CONFIGURED_IMAGE="$(
            awk -F'"' \
              '/^[[:space:]]*image[[:space:]]*=/{print $2}' \
              "${TFVARS_FILE}"
          )"

          CONFIGURED_VERSION="$(
            awk -F'"' \
              '/^[[:space:]]*APP_VERSION[[:space:]]*=/{print $2}' \
              "${TFVARS_FILE}"
          )"

          if [ "${CONFIGURED_VERSION}" != "${RELEASE_TAG}" ]; then
            echo "Release tag ${RELEASE_TAG} does not match APP_VERSION ${CONFIGURED_VERSION}."
            exit 1
          fi

          TARGET_REPOSITORY="${REGION}-docker.pkg.dev/${TARGET_PROJECT_ID}/${REPOSITORY}/${IMAGE_NAME}"

          if [[ ! "${CONFIGURED_IMAGE}" =~ ^${TARGET_REPOSITORY}@sha256:[a-f0-9]{64}$ ]]; then
            echo "Stage Terraform must reference an immutable image in ${TARGET_REPOSITORY}."
            exit 1
          fi

          IMAGE_DIGEST="${CONFIGURED_IMAGE##*@}"
          SOURCE_DIGEST_URI="${REGION}-docker.pkg.dev/${SOURCE_PROJECT_ID}/${REPOSITORY}/${IMAGE_NAME}@${IMAGE_DIGEST}"
          BUILD_DIGEST_URI="${REGION}-docker.pkg.dev/${BUILD_SOURCE_PROJECT_ID}/${REPOSITORY}/${IMAGE_NAME}@${IMAGE_DIGEST}"
          TARGET_TAG_URI="${TARGET_REPOSITORY}:${RELEASE_TAG}"
          TARGET_DIGEST_URI="${TARGET_REPOSITORY}@${IMAGE_DIGEST}"

          {
            echo "digest=${IMAGE_DIGEST}"
            echo "source_digest_uri=${SOURCE_DIGEST_URI}"
            echo "build_digest_uri=${BUILD_DIGEST_URI}"
            echo "target_tag_uri=${TARGET_TAG_URI}"
            echo "target_digest_uri=${TARGET_DIGEST_URI}"
          } >> "${GITHUB_OUTPUT}"

      - name: Verify Cloud Build source provenance
        shell: bash
        env:
          BUILD_DIGEST_URI: ${{ steps.image.outputs.build_digest_uri }}
          BUILD_SOURCE_PROJECT_ID: ${{ vars.BUILD_SOURCE_PROJECT_ID }}
        run: |
          set -euo pipefail

          PROVENANCE_FILE="${RUNNER_TEMP}/source-provenance.json"

          gcloud artifacts docker images describe \
            "${BUILD_DIGEST_URI}" \
            --project="${BUILD_SOURCE_PROJECT_ID}" \
            --show-provenance \
            --format=json \
            > "${PROVENANCE_FILE}"

          SOURCE_URI="$(
            python - \
              "${PROVENANCE_FILE}" \
              "${BUILD_SOURCE_PROJECT_ID}" <<'PY'
          import base64
          import json
          import sys

          provenance_file = sys.argv[1]
          build_source_project = sys.argv[2]
          expected_prefix = (
              f"gs://{build_source_project}_cloudbuild/source/"
          )

          with open(provenance_file, encoding="utf-8") as handle:
              document = json.load(handle)

          records = (
              document
              .get("provenance_summary", {})
              .get("provenance", [])
          )

          if not records:
              raise SystemExit(
                  "No Cloud Build provenance records were found."
              )

          slsa_records = []
          source_uris = set()

          def collect_strings(value):
              if isinstance(value, dict):
                  for nested in value.values():
                      collect_strings(nested)
              elif isinstance(value, list):
                  for nested in value:
                      collect_strings(nested)
              elif isinstance(value, str):
                  if value.startswith(expected_prefix):
                      source_uris.add(value)

          for record in records:
              build = record.get("build", {})
              statement_metadata = (
                  build.get("inTotoSlsaProvenanceV1")
                  or build.get("intotoStatement")
                  or {}
              )

              predicate_type = statement_metadata.get(
                  "predicateType", ""
              )

              if predicate_type not in {
                  "https://slsa.dev/provenance/v1",
                  "https://slsa.dev/provenance/v0.1",
              }:
                  continue

              slsa_records.append(predicate_type)

              payload = record.get("envelope", {}).get("payload")
              if not payload:
                  continue

              payload += "=" * (-len(payload) % 4)
              statement = json.loads(
                  base64.urlsafe_b64decode(payload).decode("utf-8")
              )
              collect_strings(statement)

          if not slsa_records:
              raise SystemExit(
                  "No supported SLSA provenance record was found."
              )

          if len(source_uris) != 1:
              raise SystemExit(
                  "Expected exactly one trusted Cloud Build source archive; "
                  f"found {len(source_uris)}."
              )

          print(next(iter(source_uris)))
          PY
          )"

          if [ -z "${SOURCE_URI}" ]; then
            echo "Cloud Build source URI resolution failed."
            exit 1
          fi

          echo "Verifying provenance from trusted source archive: ${SOURCE_URI}"

          timeout 5m slsa-verifier verify-image \
            "${BUILD_DIGEST_URI}" \
            --provenance-path "${PROVENANCE_FILE}" \
            --source-uri "${SOURCE_URI}" \
            --builder-id \
              "https://cloudbuild.googleapis.com/GoogleHostedWorker"

          echo "Cloud Build source provenance verification passed."

      - name: Protect immutable release tag
        shell: bash
        env:
          EXPECTED_DIGEST: ${{ steps.image.outputs.digest }}
          TARGET_TAG_URI: ${{ steps.image.outputs.target_tag_uri }}
        run: |
          set -euo pipefail

          EXISTING_DIGEST="$(
            gcloud artifacts docker images describe \
              "${TARGET_TAG_URI}" \
              --project="${{ vars.GCP_PROJECT_ID }}" \
              --format="value(image_summary.digest)" \
              2>/dev/null || true
          )"

          if [ -n "${EXISTING_DIGEST}" ] && \
             [ "${EXISTING_DIGEST}" != "${EXPECTED_DIGEST}" ]; then
            echo "Release tag already points to a different digest."
            echo "Existing: ${EXISTING_DIGEST}"
            echo "Expected: ${EXPECTED_DIGEST}"
            exit 1
          fi

          if [ -n "${EXISTING_DIGEST}" ]; then
            echo "Release tag already points to the expected digest; continuing idempotently."
          else
            echo "Release tag is available for promotion."
          fi

      - name: Verify signed source artifact
        shell: bash
        env:
          SOURCE_DIGEST_URI: ${{ steps.image.outputs.source_digest_uri }}
          CERTIFICATE_IDENTITY: https://github.com/Marcel2tight/paved-road-platform/.github/workflows/build-paved-road-image.yml@refs/heads/main
        run: |
          set -euo pipefail

          timeout 5m cosign verify \
            "${SOURCE_DIGEST_URI}" \
            --certificate-identity "${CERTIFICATE_IDENTITY}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            >/dev/null

          timeout 5m cosign verify-attestation \
            "${SOURCE_DIGEST_URI}" \
            --type spdxjson \
            --certificate-identity "${CERTIFICATE_IDENTITY}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            >/dev/null

      - name: Copy image and supply-chain artifacts
        shell: bash
        env:
          SOURCE_DIGEST_URI: ${{ steps.image.outputs.source_digest_uri }}
          TARGET_TAG_URI: ${{ steps.image.outputs.target_tag_uri }}
        run: |
          set -euo pipefail

          # Artifact Registry returned a Content-Length mismatch to ORAS.
          # Cosign copy uses its registry-compatible copy implementation and
          # preserves the image, signature, and attestation.
          timeout 10m cosign copy \
            --timeout 5m \
            "${SOURCE_DIGEST_URI}" \
            "${TARGET_TAG_URI}"

      - name: Verify promoted digest
        shell: bash
        env:
          EXPECTED_DIGEST: ${{ steps.image.outputs.digest }}
          TARGET_TAG_URI: ${{ steps.image.outputs.target_tag_uri }}
        run: |
          set -euo pipefail

          ACTUAL_DIGEST="$(
            gcloud artifacts docker images describe \
              "${TARGET_TAG_URI}" \
              --project="${{ vars.GCP_PROJECT_ID }}" \
              --format="value(image_summary.digest)"
          )"

          if [ "${ACTUAL_DIGEST}" != "${EXPECTED_DIGEST}" ]; then
            echo "Promoted digest ${ACTUAL_DIGEST} does not match ${EXPECTED_DIGEST}."
            exit 1
          fi

          echo "Promoted image digest matches the verified source digest."

      - name: Verify promoted signature and SBOM attestation
        shell: bash
        env:
          TARGET_DIGEST_URI: ${{ steps.image.outputs.target_digest_uri }}
          CERTIFICATE_IDENTITY: https://github.com/Marcel2tight/paved-road-platform/.github/workflows/build-paved-road-image.yml@refs/heads/main
        run: |
          set -euo pipefail

          timeout 5m cosign verify \
            "${TARGET_DIGEST_URI}" \
            --certificate-identity "${CERTIFICATE_IDENTITY}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            >/dev/null

          timeout 5m cosign verify-attestation \
            "${TARGET_DIGEST_URI}" \
            --type spdxjson \
            --certificate-identity "${CERTIFICATE_IDENTITY}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            >/dev/null

      - name: Terraform plan
        run: terraform -chdir="${TF_WORKING_DIR}" plan -out=tfplan

      - name: Upload Terraform plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.target_environment }}-${{ inputs.component }}-tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 1

  promotion-apply:
    name: "Apply (${{ inputs.target_environment }})"
    needs: promotion-plan
    runs-on: ubuntu-latest

    environment: ${{ inputs.target_environment }}

    concurrency:
      group: promote-apply-${{ inputs.target_environment }}-${{ inputs.component }}
      cancel-in-progress: false

    env:
      TF_WORKING_DIR: ${{ vars.TF_ROOT }}
      TF_IN_AUTOMATION: true
      TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud via OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOYER_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform -chdir="${TF_WORKING_DIR}" init -reconfigure

      - name: Select Terraform workspace
        shell: bash
        run: |
          terraform -chdir="${TF_WORKING_DIR}" workspace select default

      - name: Download Terraform plan artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.target_environment }}-${{ inputs.component }}-tfplan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform apply
        run: terraform -chdir="${TF_WORKING_DIR}" apply -auto-approve tfplan

      - name: Verify Cloud Run readiness and traffic
        shell: bash
        run: |
          set -euo pipefail

          SERVICE="${{ vars.CLOUD_RUN_SERVICE }}"
          REGION="${{ vars.GCP_REGION }}"
          PROJECT="${{ vars.GCP_PROJECT_ID }}"

          SERVICE_JSON="$(
            gcloud run services describe "${SERVICE}" \
              --platform=managed \
              --region="${REGION}" \
              --project="${PROJECT}" \
              --format=json
          )"

          LATEST_CREATED="$(
            jq -r '.status.latestCreatedRevisionName // empty' \
              <<<"${SERVICE_JSON}"
          )"

          LATEST_READY="$(
            jq -r '.status.latestReadyRevisionName // empty' \
              <<<"${SERVICE_JSON}"
          )"

          READY_STATUS="$(
            jq -r '
              .status.conditions[]
              | select(.type == "Ready")
              | .status
            ' <<<"${SERVICE_JSON}"
          )"

          LATEST_TRAFFIC_PERCENT="$(
            jq -r --arg revision "${LATEST_READY}" '
              [
                .status.traffic[]?
                | select(
                    .latestRevision == true or
                    .revisionName == $revision or
                    .revision == $revision
                  )
                | (.percent // 0)
              ]
              | add // 0
            ' <<<"${SERVICE_JSON}"
          )"

          printf 'Service:                 %s\n' "${SERVICE}"
          printf 'Latest created revision: %s\n' "${LATEST_CREATED}"
          printf 'Latest ready revision:   %s\n' "${LATEST_READY}"
          printf 'Ready condition:         %s\n' "${READY_STATUS}"
          printf 'Latest revision traffic: %s%%\n' "${LATEST_TRAFFIC_PERCENT}"

          if [ -z "${LATEST_CREATED}" ] || [ -z "${LATEST_READY}" ]; then
            echo "::error::Cloud Run did not report created and ready revisions."
            exit 1
          fi

          if [ "${LATEST_CREATED}" != "${LATEST_READY}" ]; then
            echo "::error::Latest created revision is not the latest ready revision."
            exit 1
          fi

          if [ "${READY_STATUS}" != "True" ]; then
            echo "::error::Cloud Run service Ready condition is not True."
            exit 1
          fi

          if [ "${LATEST_TRAFFIC_PERCENT}" != "100" ]; then
            echo "::error::Latest ready revision is not receiving 100% of traffic."
            exit 1
          fi

          echo "PASS: Cloud Run is ready and the latest revision receives 100% traffic."

      - name: Verify deployed immutable digest
        shell: bash
        env:
          EXPECTED_DIGEST_URI: ${{ needs.promotion-plan.outputs.expected_digest_uri }}
        run: |
          set -euo pipefail

          if [[ ! "${EXPECTED_DIGEST_URI}" =~ @sha256:[a-f0-9]{64}$ ]]; then
            echo "::error::Expected digest output is missing or invalid: ${EXPECTED_DIGEST_URI}"
            exit 1
          fi

          LATEST_READY_REVISION="$(
            gcloud run services describe \
              "${{ vars.CLOUD_RUN_SERVICE }}" \
              --platform=managed \
              --region="${{ vars.GCP_REGION }}" \
              --project="${{ vars.GCP_PROJECT_ID }}" \
              --format='value(status.latestReadyRevisionName)'
          )"

          if [ -z "${LATEST_READY_REVISION}" ]; then
            echo "::error::Cloud Run did not report a latest ready revision."
            exit 1
          fi

          DEPLOYED_DIGEST_URI="$(
            gcloud run revisions describe \
              "${LATEST_READY_REVISION}" \
              --region="${{ vars.GCP_REGION }}" \
              --project="${{ vars.GCP_PROJECT_ID }}" \
              --format='value(status.imageDigest)'
          )"

          printf 'Expected digest: %s\n' "${EXPECTED_DIGEST_URI}"
          printf 'Ready revision:  %s\n' "${LATEST_READY_REVISION}"
          printf 'Deployed digest: %s\n' "${DEPLOYED_DIGEST_URI}"

          if [ "${DEPLOYED_DIGEST_URI}" != "${EXPECTED_DIGEST_URI}" ]; then
            echo "::error::Cloud Run is not running the approved immutable digest."
            exit 1
          fi

          echo "PASS: Cloud Run is running the approved immutable digest."

      - name: Verify authenticated application health
        shell: bash
        run: |
          set -euo pipefail

          PROJECT="${{ vars.GCP_PROJECT_ID }}"
          REGION="${{ vars.GCP_REGION }}"
          SERVICE="${{ vars.CLOUD_RUN_SERVICE }}"
          SCHEDULER_JOB="${SERVICE}-health-probe"

          PROBE_STARTED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          printf 'Project:          %s\n' "${PROJECT}"
          printf 'Region:           %s\n' "${REGION}"
          printf 'Scheduler job:    %s\n' "${SCHEDULER_JOB}"
          printf 'Probe started at: %s\n' "${PROBE_STARTED_AT}"

          gcloud scheduler jobs run "${SCHEDULER_JOB}" \
            --project="${PROJECT}" \
            --location="${REGION}"

          PROBE_STATUS=""

          for ATTEMPT in {1..24}; do
            PROBE_STATUS="$(
              gcloud logging read \
                "resource.type=\"cloud_scheduler_job\"
                 AND resource.labels.job_id=\"${SCHEDULER_JOB}\"
                 AND jsonPayload.@type=\"type.googleapis.com/google.cloud.scheduler.logging.AttemptFinished\"
                 AND timestamp>=\"${PROBE_STARTED_AT}\"" \
                --project="${PROJECT}" \
                --limit=1 \
                --order=desc \
                --format='value(httpRequest.status)'
            )"

            if [ -n "${PROBE_STATUS}" ]; then
              break
            fi

            printf 'Waiting for probe result (%s/24)...\n' "${ATTEMPT}"
            sleep 5
          done

          printf 'Fresh probe HTTP status: %s\n' "${PROBE_STATUS:-not found}"

          if [ -z "${PROBE_STATUS}" ]; then
            echo "::error::No completed health-probe execution was found within 120 seconds."
            exit 1
          fi

          if [ "${PROBE_STATUS}" != "200" ]; then
            echo "::error::Authenticated /health probe returned HTTP ${PROBE_STATUS}; expected 200."
            exit 1
          fi

          echo "PASS: Authenticated internal /health probe returned HTTP 200."

      - name: Notify Slack (Promotion Success)
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \"🚀 *Promotion Successful*\n*Environment:* \`${{ inputs.target_environment }}\`\n*Component:* \`${{ inputs.component }}\`\n*Commit:* \`${{ github.sha }}\`\n*Triggered by:* ${{ github.actor }}\"
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack (Promotion Failure)
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \"🔥 *Promotion Failed*\n*Environment:* \`${{ inputs.target_environment }}\`\n*Component:* \`${{ inputs.component }}\`\n*Commit:* \`${{ github.sha }}\`\n*Actor:* ${{ github.actor }}\n*Logs:* https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}