apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: paved-road-cloud-run
  title: Paved Road Cloud Run
  description: Generate Cloud Run Terraform and open a PR in paved-road-platform

spec:
  owner: platform-team
  type: service

  parameters:
    - title: Cloud Run Service Settings
      required:
        - service_name
        - project_id
        - region
        - image
        - service_account_email
      properties:
        service_name:
          title: Service Name
          type: string
          description: Name of the Cloud Run service

        project_id:
          title: GCP Project ID
          type: string
          description: GCP project where the service will be deployed

        region:
          title: Region
          type: string
          default: us-central1

        image:
          title: Container Image
          type: string
          default: us-docker.pkg.dev/cloudrun/container/hello

        environment:
          title: Environment
          type: string
          default: dev

        service_account_email:
          title: Service Account Email
          type: string
          default: paved-road-sa@imposing-fx-413205.iam.gserviceaccount.com

        container_port:
          title: Container Port
          type: number
          default: 8080

        min_instance_count:
          title: Min Instance Count
          type: number
          default: 0

        max_instance_count:
          title: Max Instance Count
          type: number
          default: 2

        cpu:
          title: CPU
          type: string
          default: "1"

        memory:
          title: Memory
          type: string
          default: 512Mi

        ingress:
          title: Ingress
          type: string
          default: INGRESS_TRAFFIC_INTERNAL_ONLY
          enum:
            - INGRESS_TRAFFIC_ALL
            - INGRESS_TRAFFIC_INTERNAL_ONLY
            - INGRESS_TRAFFIC_INTERNAL_LOAD_BALANCER

        allow_unauthenticated:
          title: Allow Unauthenticated
          type: boolean
          default: false

    - title: Publishing Settings
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repository Location
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com
            allowedOwners:
              - Marcel2tight
            allowedRepos:
              - paved-road-platform
            requestUserCredentials:
              secretsKey: USER_OAUTH_TOKEN
              additionalScopes:
                github:
                  - workflow

  steps:
    - id: fetch-base
      name: Generate Terraform Files
      action: fetch:template
      input:
        url: ./skeleton
        targetPath: ./terraform/environments/dev/cloud-run/${{ parameters.service_name }}
        values:
          service_name: ${{ parameters.service_name }}
          project_id: ${{ parameters.project_id }}
          region: ${{ parameters.region }}
          image: ${{ parameters.image }}
          environment: ${{ parameters.environment }}
          service_account_email: ${{ parameters.service_account_email }}
          container_port: ${{ parameters.container_port }}
          min_instance_count: ${{ parameters.min_instance_count }}
          max_instance_count: ${{ parameters.max_instance_count }}
          cpu: ${{ parameters.cpu }}
          memory: ${{ parameters.memory }}
          ingress: ${{ parameters.ingress }}
          allow_unauthenticated: ${{ parameters.allow_unauthenticated }}

    - id: create-pr
      name: Create Pull Request
      action: publish:github:pull-request
      input:
        repoUrl: ${{ parameters.repoUrl }}
        branchName: backstage-cloud-run-${{ parameters.service_name }}
        targetBranchName: main
        title: "feat: add Cloud Run service ${{ parameters.service_name }}"
        description: |
          This PR was generated via Backstage.

          Service Name: ${{ parameters.service_name }}
          Project ID: ${{ parameters.project_id }}
          Region: ${{ parameters.region }}
          Image: ${{ parameters.image }}
          Environment: ${{ parameters.environment }}
          Service Account: ${{ parameters.service_account_email }}
          Container Port: ${{ parameters.container_port }}
          Min Instances: ${{ parameters.min_instance_count }}
          Max Instances: ${{ parameters.max_instance_count }}
          CPU: ${{ parameters.cpu }}
          Memory: ${{ parameters.memory }}
          Ingress: ${{ parameters.ingress }}
          Allow Unauthenticated: ${{ parameters.allow_unauthenticated }}

          This follows the Paved Road Engine workflow.
        commitMessage: "feat: add Cloud Run service ${{ parameters.service_name }}"
        sourcePath: ./
        update: true
        token: ${{ secrets.USER_OAUTH_TOKEN }}

  output:
    links:
      - title: Pull Request
        url: ${{ steps['create-pr'].output.remoteUrl }}